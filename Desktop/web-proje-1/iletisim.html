<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 bg-white p-4 shadow-sm rounded">
            <h2 class="mb-4 text-center">İletişim Formu</h2>
            
            <form id="iletisimFormu" action="islem.php" method="POST">
                <div class="row mb-3">
                    <div class="col">
                        <input type="text" id="ad" name="ad" class="form-control" placeholder="Adınız">
                    </div>
                    <div class="col">
                        <input type="text" id="soyad" name="soyad" class="form-control" placeholder="Soyadınız">
                    </div>
                </div>

                <div class="mb-3">
                    <input type="email" id="email" name="email" class="form-control" placeholder="E-posta (Örn: b2412100001@sakarya.edu.tr)">
                </div>
                <div class="mb-3">
                    <input type="text" id="telefon" name="telefon" class="form-control" placeholder="Telefon (Sadece rakam)">
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Cinsiyet:</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek">
                        <label class="form-check-label" for="erkek">Erkek</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın">
                        <label class="form-check-label" for="kadin">Kadın</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">İlgi Alanları:</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="yazilim" value="Yazılım">
                        <label class="form-check-label" for="yazilim">Yazılım</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="spor" value="Spor">
                        <label class="form-check-label" for="spor">Spor</label>
                    </div>
                </div>

                <div class="mb-3">
                    <select id="konu" name="konu" class="form-select">
                        <option value="">Konu Seçiniz</option>
                        <option value="Destek">Destek</option>
                        <option value="Öneri">Öneri</option>
                    </select>
                </div>

                <div class="mb-3">
                    <textarea id="mesaj" name="mesaj" class="form-control" rows="3" placeholder="Mesajınız"></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="button" onclick="validateNative()" class="btn btn-primary">Native JS ile Denetle ve Gönder</button>
                    <button type="button" @click="validateVue()" class="btn btn-success">Vue.js ile Denetle ve Gönder</button>
                    <button type="reset" class="btn btn-outline-secondary">Temizle</button>
                </div>
            </form>
        </div>
    </div>
</div>

 <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
 <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script>
function validateNative() {
    const ad = document.getElementById('ad').value;
    const soyad = document.getElementById('soyad').value;
    const email = document.getElementById('email').value;
    const telefon = document.getElementById('telefon').value;
    const mesaj = document.getElementById('mesaj').value;
    
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const telPattern = /^[0-9]+$/;

    // Alanların boş olup olmadığını kontrol et [cite: 16, 24, 27]
    if (ad === "" || soyad === "" || email === "" || mesaj === "") {
        alert("Lütfen zorunlu alanları doldurunuz!");
        return false;
    }

    // E-mail formatını kontrol et [cite: 16, 22, 27]
    if (!emailPattern.test(email)) {
        alert("Geçersiz e-posta formatı!");
        return false;
    }

    // Telefonun sadece rakam olup olmadığını kontrol et 
    if (telefon !== "" && !telPattern.test(telefon)) {
        alert("Telefon numarası sadece rakamlardan oluşmalıdır!");
        return false;
    }

    alert("Native JS: Kontroller başarılı. Veriler gönderiliyor...");
    document.getElementById('iletisimFormu').submit();
}
</script><script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script>
// --- NATIVE JAVASCRIPT BÖLÜMÜ (Mavi Buton) ---
function validateNative() {
    const ad = document.getElementById('ad').value;
    const soyad = document.getElementById('soyad').value;
    const email = document.getElementById('email').value;
    const telefon = document.getElementById('telefon').value;
    const mesaj = document.getElementById('mesaj').value;
    
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const telPattern = /^[0-9]+$/;

    if (ad === "" || soyad === "" || email === "" || mesaj === "") {
        alert("Native JS: Lütfen zorunlu alanları doldurunuz!");
        return false;
    }
    if (!emailPattern.test(email)) {
        alert("Native JS: Geçersiz e-posta formatı!");
        return false;
    }
    if (telefon !== "" && !telPattern.test(telefon)) {
        alert("Native JS: Telefon sadece rakam olmalıdır!");
        return false;
    }
    alert("Native JS: Kontroller başarılı! PHP'ye gönderiliyor...");
    document.getElementById('iletisimFormu').submit();
}

// --- VUE.JS BÖLÜMÜ (Yeşil Buton) ---
const { createApp } = Vue
createApp({
    data() {
        return {
            form: { ad: '', soyad: '', email: '', telefon: '', mesaj: '' }
        }
    },
    methods: {
        validateVue() {
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const telPattern = /^[0-9]+$/;

            if (!this.form.ad || !this.form.soyad || !this.form.email || !this.form.mesaj) {
                alert("Vue.js: Eksik alanları doldurun!");
                return;
            }
            if (!emailPattern.test(this.form.email)) {
                alert("Vue.js: E-posta formatı hatalı!");
                return;
            }
            if (this.form.telefon && !telPattern.test(this.form.telefon)) {
                alert("Vue.js: Sadece rakam giriniz!");
                return;
            }
            alert("Vue.js: Başarılı! PHP'ye yönlendiriliyorsunuz...");
            document.getElementById('iletisimFormu').submit();
        }
    }
}).mount('#iletisimFormu')
</script> // Bir sonraki adımda buraları dolduracağız!
