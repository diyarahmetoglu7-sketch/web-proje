<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap - Web Teknolojileri</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Üye Girişi</h3>
                        <form id="loginForm" action="login.php" method="POST" onsubmit="return validateLogin()">
                            <div class="mb-3">
                                <label class="form-label">E-posta (Öğrenci No)</label>
                                <input type="email" name="username" id="loginEmail" class="form-control" placeholder="b2112100XXX@sakarya.edu.tr">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Şifre</label>
                                <input type="password" name="password" id="loginPassword" class="form-control" placeholder="Öğrenci Numaranız">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    function validateLogin() {
        var email = document.getElementById("loginEmail").value;
        var pass = document.getElementById("loginPassword").value;

        // Boş alan kontrolü 
        if (email == "" || pass == "") {
            alert("Kullanıcı adı veya şifre boş bırakılamaz!");
            return false;
        }
        
        // Basit email format kontrolü 
        if (!email.includes("@")) {
            alert("Lütfen geçerli bir e-posta adresi giriniz!");
            return false;
        }
        return true;
    }
    </script>
