<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehrim - Sakarya</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-4">Güzel Şehrim: Sakarya</h1>
    
    <div id="sehirSlider" class="carousel slide shadow mb-5" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="img/sakarya1.jpg" class="d-block w-100" alt="Sakarya 1">
            </div>
            <div class="carousel-item">
                <img src="img/sakarya2.jpg" class="d-block w-100" alt="Sakarya 2">
            </div>
            <div class="carousel-item">
                <img src="img/sakarya3.jpg" class="d-block w-100" alt="Sakarya 3">
            </div>
            <div class="carousel-item">
                <img src="img/sakarya4.jpg" class="d-block w-100" alt="Sakarya 4">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#sehirSlider" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#sehirSlider" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="row">
        <div class="col-md-8">
            <h3>Sakarya Hakkında</h3>
            <p>Marmara Bölgesi'nin parlayan yıldızı Sakarya, doğası ve sanayisi ile bilinir. Nüfusu yaklaşık 1 milyonu aşmıştır.</p>
            <ul>
                <li><strong>Gezilecek Yerler:</strong> Sapanca Gölü, Taraklı Evleri, Acarlar Longozu.</li>
            </ul>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
