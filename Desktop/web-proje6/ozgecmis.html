<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Özgeçmiş - Semantic HTML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="bg-dark text-white text-center py-5">
    <h1>Özgeçmişim</h1>
    <p>Bilgisayar Mühendisliği Öğrencisi</p>
</header>

<main class="container mt-5">
    <section id="egitim" class="mb-5">
        <header>
            <h2 class="border-bottom pb-2">Eğitim Bilgileri</h2>
        </header>
        <article class="mt-3">
            <h3>Sakarya Üniversitesi</h3>
            <p><strong>Bölüm:</strong> Bilgisayar Mühendisliği (1. Sınıf)</p>
            <p><em>2025 - Devam Ediyor</em></p>
        </article>
    </section>

    <section id="yetenekler" class="mb-5">
        <header>
            <h2 class="border-bottom pb-2">Yetenekler</h2>
        </header>
        <article class="mt-3">
            <ul>
                <li>HTML5 & CSS3 (Semantik Yapı)</li>
                <li>JavaScript & Vue.js</li>
                <li>C++ & Nesne Yönelimli Programlama</li>
            </ul>
        </article>
    </section>
</main>

<footer class="text-center py-4 bg-light">
    <p>&copy; 2026 - Tüm Hakları Saklıdır.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
