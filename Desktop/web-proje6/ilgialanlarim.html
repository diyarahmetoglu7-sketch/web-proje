<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İlgi Alanlarım - API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">İlgi Alanlarım: Favori Filmler</h2>
    <p class="text-muted text-center mb-5">Aşağıdaki veriler bir dış API (The Movie Database) üzerinden canlı olarak çekilmektedir.</p>

    <div id="film-listesi" class="row">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Yükleniyor...</span>
            </div>
        </div>
    </div>
</div>

<script>
// Örnek bir API kullanımı (TMDB veya ücretsiz bir film API'si)
// Not: Bu kısımda gerçek bir API anahtarı veya açık bir API endpoint'i kullanılır.
async function filmleriGetir() {
    try {
        // Test amaçlı ücretsiz ve anahtar istemeyen bir API (JSONPlaceholder veya benzeri bir film listesi)
        const response = await fetch('https://jsonplaceholder.typicode.com/photos?_limit=6'); 
        const data = await response.json();
        
        let html = '';
        data.forEach(item => {
            html += `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm">
                        <img src="${item.thumbnailUrl}" class="card-img-top" alt="Film">
                        <div class="card-body">
                            <h5 class="card-title">Film Başlığı ${item.id}</h5>
                            <p class="card-text text-truncate">${item.title}</p>
                            <a href="#" class="btn btn-sm btn-outline-primary">Detaylar</a>
                        </div>
                    </div>
                </div>
            `;
        });
        document.getElementById('film-listesi').innerHTML = html;
    } catch (error) {
        document.getElementById('film-listesi').innerHTML = "<p class='text-danger text-center'>Veriler çekilemedi.</p>";
    }
}

// Sayfa yüklendiğinde çalıştır
filmleriGetir();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
