<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - Proje Ödevi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4">İletişim Formu</h2>
    
    <form id="iletisimFormu" action="iletisim.php" method="POST" class="row g-3">
        
        <div class="col-md-6">
            <label for="ad" class="form-label">Ad Soyad</label>
            <input type="text" class="form-control" id="ad" name="ad">
        </div>

        <div class="col-md-6">
            <label for="email" class="form-control-label">E-posta</label>
            <input type="email" class="form-control" id="email" name="email">
        </div>

        <div class="col-md-4">
            <label for="sehir" class="form-label">Şehir</label>
            <select id="sehir" name="sehir" class="form-select">
                <option value="">Seçiniz...</option>
                <option value="Sakarya">Sakarya</option>
                <option value="İstanbul">İstanbul</option>
            </select>
        </div>

        <div class="col-md-4">
            <label class="form-label d-block">Cinsiyet</label>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek">
                <label class="form-check-label" for="erkek">Erkek</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın">
                <label class="form-check-label" for="kadin">Kadın</label>
            </div>
        </div>

        <div class="col-12">
            <label for="mesaj" class="form-label">Mesajınız</label>
            <textarea class="form-control" id="mesaj" name="mesaj" rows="3"></textarea>
        </div>

        <div class="col-12 mt-4">
           <button type="button" @click="validateVue" class="btn btn-success">Vue.js ile Denetle ve Gönder</button>
            <button type="button" onclick="validateVue()" class="btn btn-success">Vue.js ile Denetle ve Gönder</button>
            <button type="reset" class="btn btn-secondary">Temizle</button>
        </div>

    </form>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="kontrol.js"></script>
</body>
</html>
